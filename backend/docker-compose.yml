services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8976:8080"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_URL=postgres://synthbull:synthbull_secret@postgres:5432/synthbull
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # volumes:
    #   - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: synthbull
      POSTGRES_PASSWORD: synthbull_secret
      POSTGRES_DB: synthbull
    # volumes:
    #   - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synthbull"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# volumes:
#   redis_data:
#     driver: local
#   postgres_data:
#     driver: local
